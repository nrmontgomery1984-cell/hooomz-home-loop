<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Loop — Hooomz</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A1814">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Home Loop">
<link rel="apple-touch-icon" href="/icons/icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --linen: #F5F0E8;
  --linen-mid: #EDE6D8;
  --linen-dark: #D8CEBC;
  --near-black: #1A1814;
  --near-black-mid: #2C2820;
  --near-black-soft: #3D3830;
  --amber: #C8832A;
  --amber-light: #E9A84C;
  --amber-dim: #F0DEB8;
  --text-primary: #1A1814;
  --text-secondary: #5A5248;
  --text-tertiary: #8A7E72;
  --border: rgba(26,24,20,0.12);
  --border-mid: rgba(26,24,20,0.2);
  --radius: 10px;
  --radius-lg: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Figtree', sans-serif;
  background: var(--linen);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 0;
}

.page-wrap {
  max-width: 740px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

.wordmark {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--text-tertiary);
  text-transform: lowercase;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.wordmark::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

.page-title {
  font-size: 32px;
  font-weight: 300;
  color: var(--near-black);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.1;
}

.page-subtitle {
  font-size: 14px;
  color: var(--text-tertiary);
  margin-bottom: 40px;
  font-weight: 400;
}

.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 32px;
  border-bottom: 0.5px solid var(--border);
}

.tab {
  padding: 10px 20px;
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-tertiary);
  background: none;
  border: none;
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
  letter-spacing: 0.01em;
}

.tab::after {
  content: '';
  position: absolute;
  bottom: -0.5px;
  left: 0; right: 0;
  height: 1.5px;
  background: var(--near-black);
  transform: scaleX(0);
  transition: transform 0.2s;
}

.tab.active { color: var(--near-black); }
.tab.active::after { transform: scaleX(1); }
.tab:hover { color: var(--near-black-soft); }

.view { display: none; }
.view.active { display: block; }

.progress-strip {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}

.progress-track {
  flex: 1;
  height: 2px;
  background: var(--linen-dark);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.progress-text {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-tertiary);
  white-space: nowrap;
}

.group-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin: 24px 0 10px;
}

.group-label:first-child { margin-top: 0; }

.task-item {
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.task-item:hover { border-color: var(--border-mid); }
.task-item.done { opacity: 0.5; }
.task-item.done .task-name { text-decoration: line-through; text-decoration-color: var(--text-tertiary); }

.task-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
}

.check-circle {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--border-mid);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  cursor: pointer;
}

.task-item.done .check-circle {
  background: var(--amber);
  border-color: var(--amber);
}

.check-circle svg { display: none; }
.task-item.done .check-circle svg { display: block; }

.task-name {
  flex: 1;
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.4;
}

.task-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.zone-pill {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 400;
  white-space: nowrap;
  letter-spacing: 0.03em;
}

.time-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
}

.expand-icon {
  width: 16px;
  height: 16px;
  color: var(--text-tertiary);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.task-item.expanded .expand-icon { transform: rotate(180deg); }
.task-item.no-tip .expand-icon { opacity: 0; pointer-events: none; }

.task-tip {
  display: none;
  padding: 0 14px 14px 46px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.65;
  border-top: 0.5px solid var(--border);
  padding-top: 12px;
  background: var(--linen-mid);
}

.task-item.expanded .task-tip { display: block; }

.tip-source {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

.tip-steps {
  list-style: none;
  margin-top: 8px;
}

.tip-steps li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 5px;
  font-size: 13px;
  color: var(--text-secondary);
}

.tip-steps li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--amber);
  font-size: 11px;
}

.reset-link {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  letter-spacing: 0.04em;
}

.reset-link:hover { color: var(--text-secondary); }

.section-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-count {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-tertiary);
}

/* zone colors */
.pill-kitchen { background: #F0DEB8; color: #7A5010; }
.pill-bathroom { background: #DEEAF5; color: #2A5A82; }
.pill-bedroom  { background: #F5E8E0; color: #8A3820; }
.pill-living   { background: #EAE0F0; color: #5A3080; }
.pill-laundry  { background: #D8F0E8; color: #1A6840; }
.pill-floors   { background: #E8F0D8; color: #3A5810; }
.pill-general  { background: #EAE6E0; color: #5A5248; }
.pill-outside  { background: #D8F0E8; color: #1A6840; }

/* zones tab */
.zone-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 36px;
}

.zone-card {
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
}

.zone-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.zone-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--near-black);
  margin-bottom: 4px;
}

.zone-rooms {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.5;
}

.zone-week-badge {
  display: inline-block;
  margin-top: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--amber-dim);
  color: var(--amber);
  letter-spacing: 0.04em;
}

.zone-detail-header {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}

/* ============ HEALTH ============ */
.health-summary {
  background: var(--near-black);
  color: var(--linen);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.health-summary-cell { min-width: 0; }
.health-summary-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.55);
  margin-bottom: 6px;
}
.health-summary-value {
  font-size: 13px;
  color: var(--linen);
  line-height: 1.35;
  word-break: break-word;
  min-height: 18px;
}

.health-card {
  background: #FFFFFF;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.health-card-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 14px;
}

.sleep-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.sleep-btn {
  font-family: 'Figtree', sans-serif;
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--text-primary);
  min-height: 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.sleep-btn:hover { border-color: var(--border-mid); }
.sleep-btn.active {
  background: var(--amber);
  border-color: var(--amber);
  color: var(--linen);
}
.sleep-emoji { font-size: 22px; line-height: 1; }
.sleep-label { font-size: 13px; font-weight: 500; }
.sleep-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  opacity: 0.75;
}

.activity-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.emoji-toggle {
  font-family: 'Figtree', sans-serif;
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 2px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--text-primary);
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.emoji-toggle:hover { border-color: var(--border-mid); }
.emoji-toggle.active {
  background: var(--amber);
  border-color: var(--amber);
  color: var(--linen);
}
.emoji-toggle-emoji { font-size: 20px; line-height: 1; }
.emoji-toggle-label { font-size: 10px; font-weight: 500; }

.fluids-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.fluid-btn {
  font-family: 'Figtree', sans-serif;
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--text-primary);
  min-height: 84px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
}
.fluid-btn:hover { border-color: var(--border-mid); }
.fluid-btn.active {
  background: var(--amber-dim);
  border-color: var(--amber);
}
.fluid-emoji { font-size: 22px; line-height: 1; }
.fluid-label { font-size: 12px; font-weight: 500; }
.fluid-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
}
.fluid-btn.active .fluid-count { color: var(--amber); font-weight: 500; }

.meal-slot-select {
  font-family: 'Figtree', sans-serif;
  font-size: 14px;
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 36px 10px 12px;
  width: 100%;
  margin-bottom: 12px;
  color: var(--text-primary);
  cursor: pointer;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none'><path d='M4 6L8 10L12 6' stroke='%238A7E72' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
}
.food-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.food-btn {
  font-family: 'Figtree', sans-serif;
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 4px;
  cursor: pointer;
  text-align: center;
  position: relative;
  transition: all 0.15s;
  min-height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-primary);
}
.food-btn:hover { border-color: var(--border-mid); }
.food-btn.active {
  background: var(--amber-dim);
  border-color: var(--amber);
}
.food-btn-emoji { font-size: 20px; line-height: 1; }
.food-btn-label { font-size: 10px; font-weight: 500; }
.food-btn-qty {
  position: absolute;
  top: 4px;
  right: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  font-weight: 500;
  display: none;
}
.food-btn.active .food-btn-qty { display: block; }

.food-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
  min-height: 8px;
}
.food-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  background: var(--amber-dim);
  color: var(--amber);
  padding: 4px 8px 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.food-chip-x {
  background: none;
  border: none;
  color: var(--amber);
  font-size: 14px;
  cursor: pointer;
  line-height: 1;
  padding: 0 2px;
  opacity: 0.7;
}
.food-chip-x:hover { opacity: 1; }

.log-meal-btn {
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  font-weight: 500;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius);
  background: var(--near-black);
  color: var(--linen);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}
.log-meal-btn:hover:not(:disabled) { background: var(--near-black-mid); }
.log-meal-btn:disabled {
  background: var(--linen-dark);
  color: var(--text-tertiary);
  cursor: not-allowed;
}

.food-totals {
  background: var(--near-black);
  color: var(--linen);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-top: 18px;
  margin-bottom: 10px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}
.food-totals-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(245,240,232,0.55);
}
.food-totals-empty {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(245,240,232,0.55);
}
.food-total-item {
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.food-total-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--amber-light);
}

.meal-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--linen);
  margin-bottom: 6px;
}
.meal-entry-slot {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
  white-space: nowrap;
}
.meal-entry-time {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
}
.meal-entry-chips {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 14px;
}
.meal-entry-chip {
  display: inline-flex;
  align-items: center;
  gap: 2px;
}
.meal-entry-chip-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-tertiary);
}
.meal-entry-delete {
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 16px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
}
.meal-entry-delete:hover { color: var(--near-black); }
.meals-empty {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
  text-align: center;
  padding: 12px;
}

/* ============ HISTORY ============ */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}
.cal-title {
  font-size: 18px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--near-black);
}
.cal-nav {
  font-family: 'Figtree', sans-serif;
  background: var(--linen);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-primary);
  min-height: 34px;
  transition: border-color 0.15s;
}
.cal-nav:hover:not(:disabled) { border-color: var(--border-mid); }
.cal-nav:disabled { opacity: 0.3; cursor: not-allowed; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 24px;
}
.cal-dow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-tertiary);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 6px 0;
}
.cal-cell {
  aspect-ratio: 1;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--linen-mid);
  position: relative;
}
.cal-cell.empty { border: none; background: transparent; }
.cal-cell.muted {
  color: var(--text-tertiary);
  opacity: 0.45;
  background: transparent;
  border: 0.5px dashed var(--border);
}
.cal-cell.has-data {
  background: #FFFFFF;
  cursor: pointer;
  transition: border-color 0.15s;
}
.cal-cell.has-data:hover { border-color: var(--border-mid); }
.cal-cell.today { border: 1.5px solid var(--amber); }
.cal-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--amber);
}
.cal-cell:not(.has-data) .cal-dot { visibility: hidden; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,24,20,0.55);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 1000;
  animation: ol-in 0.2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes ol-in {
  from { background: rgba(26,24,20,0); }
  to   { background: rgba(26,24,20,0.55); }
}
.modal-sheet {
  background: var(--linen);
  width: 100%;
  max-width: 740px;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 24px 24px 36px;
  max-height: 80vh;
  overflow-y: auto;
  animation: sheet-in 0.25s ease;
  position: relative;
}
@keyframes sheet-in {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 22px;
  color: var(--text-tertiary);
  cursor: pointer;
  line-height: 1;
  padding: 6px 10px;
}
.modal-close:hover { color: var(--near-black); }
.modal-date {
  font-size: 20px;
  font-weight: 400;
  margin-bottom: 22px;
  letter-spacing: -0.01em;
}
.modal-section { margin-bottom: 18px; }
.modal-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.modal-section-value {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.modal-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--amber-dim);
  color: var(--amber);
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: 500;
  font-size: 13px;
}
.modal-empty { color: var(--text-tertiary); font-style: italic; font-size: 13px; }
.modal-meal-entry {
  background: #FFFFFF;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}
.modal-meal-list { display: flex; flex-direction: column; width: 100%; gap: 0; }

@media (max-width: 480px) {
  .health-summary { gap: 10px; padding: 14px 14px; }
  .health-summary-value { font-size: 12px; }
  .activity-grid { gap: 4px; }
  .emoji-toggle { padding: 8px 1px; min-height: 54px; }
  .emoji-toggle-label { font-size: 9px; }
  .food-grid { gap: 4px; }
  .meal-entry-slot { font-size: 9px; }
}

</style>

<body>
<div class="page-wrap">

  <div class="wordmark">hooomz / home loop</div>

  <h1 class="page-title">Home maintenance<br>system</h1>
  <p class="page-subtitle">Daily · weekly · monthly rhythms. Tap a task for method notes.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(event,'daily')">Daily</button>
    <button class="tab" onclick="switchTab(event,'weekly')">Weekly</button>
    <button class="tab" onclick="switchTab(event,'monthly')">Monthly</button>
    <button class="tab" onclick="switchTab(event,'zones')">Zones</button>
    <button class="tab" onclick="switchTab(event,'health')">Health</button>
    <button class="tab" onclick="switchTab(event,'history')">History</button>
  </div>

  <!-- DAILY -->
  <div id="view-daily" class="view active">
    <div class="section-controls">
      <div class="progress-strip" style="flex:1;margin-bottom:0;margin-right:16px;">
        <div class="progress-track"><div class="progress-fill" id="prog-daily" style="width:0%"></div></div>
        <span class="progress-text" id="prog-daily-txt">0 / 0</span>
      </div>
      <button class="reset-link" onclick="resetView('daily')">reset</button>
    </div>
    <div id="list-daily"></div>
  </div>

  <!-- WEEKLY -->
  <div id="view-weekly" class="view">
    <div class="section-controls">
      <div class="progress-strip" style="flex:1;margin-bottom:0;margin-right:16px;">
        <div class="progress-track"><div class="progress-fill" id="prog-weekly" style="width:0%"></div></div>
        <span class="progress-text" id="prog-weekly-txt">0 / 0</span>
      </div>
      <button class="reset-link" onclick="resetView('weekly')">reset</button>
    </div>
    <div id="list-weekly"></div>
  </div>

  <!-- MONTHLY -->
  <div id="view-monthly" class="view">
    <div class="section-controls">
      <div class="progress-strip" style="flex:1;margin-bottom:0;margin-right:16px;">
        <div class="progress-track"><div class="progress-fill" id="prog-monthly" style="width:0%"></div></div>
        <span class="progress-text" id="prog-monthly-txt">0 / 0</span>
      </div>
      <button class="reset-link" onclick="resetView('monthly')">reset</button>
    </div>
    <div id="list-monthly"></div>
  </div>

  <!-- ZONES -->
  <div id="view-zones" class="view">
    <div class="zone-grid" id="zone-cards"></div>
    <div class="zone-detail-header">Zone deep-clean tasks — apply to whichever zone is active this week</div>
    <div id="zone-task-list"></div>
  </div>

  <!-- HEALTH -->
  <div id="view-health" class="view">
    <div class="health-summary" id="health-summary"></div>

    <section class="health-card">
      <div class="health-card-title">Sleep</div>
      <div class="sleep-options" id="sleep-options"></div>
    </section>

    <section class="health-card">
      <div class="health-card-title">Activity</div>
      <div class="activity-grid" id="activity-grid"></div>
    </section>

    <section class="health-card">
      <div class="health-card-title">Fluids</div>
      <div class="fluids-grid" id="fluids-grid"></div>
    </section>

    <section class="health-card">
      <div class="health-card-title">Food</div>
      <select class="meal-slot-select" id="meal-slot" onchange="setMealSlot(this.value)"></select>
      <div class="food-grid" id="food-grid"></div>
      <div class="food-chips" id="food-chips"></div>
      <button class="log-meal-btn" id="log-meal-btn" onclick="logMeal()" disabled>Log Meal</button>
      <div class="food-totals" id="food-totals"></div>
      <div class="meals-list" id="meals-list"></div>
    </section>
  </div>

  <!-- HISTORY -->
  <div id="view-history" class="view">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev" onclick="calShift(-1)">‹ Prev</button>
      <div class="cal-title" id="cal-title">—</div>

</div>

<div class="modal-overlay" id="day-modal" onclick="overlayClick(event)">
  <div class="modal-sheet" id="modal-body"></div>
</div>

<script>
const ZONES = [
  { num:'01', name:'Entrance & Dining', rooms:'Front porch, entry hall, dining room', week:'Week 1' },
  { num:'02', name:'Kitchen', rooms:'Full kitchen including appliances, pantry', week:'Week 2' },
  { num:'03', name:'Bathrooms', rooms:'All bathrooms, hallways', week:'Week 3' },
  { num:'04', name:'Master Suite', rooms:'Master bedroom, master bathroom, walk-in', week:'Week 4' },
  { num:'05', name:'Living Room', rooms:'Living room, family room, den', week:'Week 5' },
];

const ZONE_TASKS = [
  { name:'Dust all surfaces in the zone — top down', tip: { source:'Clean Mama', text:'Start high (crown moulding, top of cabinets) and work down to baseboards so dust falls to already-uncleaned surfaces. Use a microfibre cloth barely dampened with water — no product needed for most dust.' } },
  { name:'Vacuum upholstered furniture if applicable', tip: { source:'Clean Mama', text:'Use the upholstery attachment. Work seat cushions first, then back and arms. Remove cushions and vacuum in the crevices. For pet hair, a rubber glove dragged across fabric picks up what the vacuum misses.' } },
  { name:'Wipe walls and light switches', tip: { source:'FlyLady', text:'Mix a drop of dish soap in warm water. Use a barely-damp microfibre cloth — not wet. Walls scuff easily. Light switches are among the highest-touch surfaces in a home; clean them every zone cycle without fail.' } },
  { name:'Clean windows and blinds', tip: { source:'Clean Mama', text:'Spray glass cleaner on the cloth, not the window — prevents overspray streaking trim. For blinds, close them one direction and wipe, then reverse and repeat. Microfibre works better than paper towel on glass.' } },
  { name:'Declutter — nothing that doesn\'t belong', tip: { source:'FlyLady', text:'FlyLady calls this "27-fling boogie" — grab 27 items to toss, donate, or relocate. The number is arbitrary but the speed is the point. Don\'t overthink, don\'t sort. Just move.' } },
  { name:'Wipe baseboards and door frames', tip: { source:'Clean Mama', text:'A dry microfibre sock on your hand works better than a cloth for baseboards. Door frames collect sticky dust — use a lightly damp cloth. Once a month per zone means every baseboard in the house gets done in 5 weeks.' } },
];

const tasks = {
  daily: [
    { id:'d1', name:'Make the bed', zone:'bedroom', time:'2 min',
      tip:{ source:'Clean Mama', text:'Do it immediately on waking before leaving the room. Clean Mama calls this the "first anchor habit" — a made bed signals the day has structure. Fitted sheet, flat sheet, duvet straight. Doesn\'t need to be hotel-level.' } },
    { id:'d2', name:'Wipe kitchen counters', zone:'kitchen', time:'3 min',
      tip:{ source:'Clean Mama', text:'Use an all-purpose spray and a microfibre cloth. Clear everything off first, spray the surface, let it sit 30 seconds, then wipe. Crumbs and grease that sit overnight become tomorrow\'s bigger problem.' } },
    { id:'d3', name:'Shine the sink', zone:'kitchen', time:'2 min',
      tip:{ source:'FlyLady', text:'FlyLady\'s flagship habit — the shiny sink. Rinse, scrub with a little dish soap, rinse again, then dry with a cloth. A dry sink doesn\'t water-spot and stays cleaner longer. "You can\'t have a dirty house with a shiny sink" is her whole thesis.' } },
    { id:'d4', name:'Quick bathroom wipe-down', zone:'bathroom', time:'3 min',
      tip:{ source:'Clean Mama', text:'Counter, faucet handles, toilet seat and rim. Keep a stack of dry microfibre cloths under the sink. Spray, wipe, done. This takes 90 seconds if you don\'t overthink it. Deep cleaning is weekly — this is maintenance only.' } },
    { id:'d5', name:'Sweep or run Roomba on main floor', zone:'floors', time:'5 min',
      tip:{ source:'Clean Mama', text:'If using a Roomba, schedule it for a consistent time (usually when you leave the house). If sweeping manually, use a good dustpan-and-brush and do a single pass. The goal is no visible crumbs or debris by end of day.' } },
    { id:'d6', name:'No dishes overnight — kitchen closed', zone:'kitchen', time:'5 min',
      tip:{ source:'FlyLady', text:'FlyLady is absolute on this. Dishes in the sink overnight breed bacteria and attract pests, but more importantly they set the psychological tone for the next morning. Waking to a clean kitchen changes your whole morning state.' } },
    { id:'d7', name:'5-minute hotspot clear', zone:'general', time:'5 min',
      tip:{ source:'FlyLady', text:'"Hotspots" are the flat surfaces where clutter accumulates — entry table, kitchen counter edge, coffee table, bathroom counter. Set a 5-minute timer and clear them all. Don\'t sort or organise, just relocate. FlyLady: "You are not behind. Jump in where you are."' } },
    { id:'d8', name:'One load of laundry if needed', zone:'laundry', time:'ongoing',
      tip:{ source:'Clean Mama', text:'Clean Mama recommends a specific laundry day per type (Monday = sheets, Tuesday = darks, etc.) but the daily habit is simply: if the hamper is full, start a load. Move it to the dryer when done. Fold same day. Never let it sit in the dryer overnight.' } },
  ],
  weekly: [
    { id:'w1', name:'Full vacuum — all rooms', zone:'floors', group:'Monday', time:'20 min',
      tip:{ source:'Clean Mama', text:'Vacuum before mopping, always. Move the vacuum in overlapping rows like you\'re mowing a lawn. Go slower than feels necessary — the beater bar needs time to agitate carpet fibres. Under the couch and beds once a week, not once a year.' } },
    { id:'w2', name:'Mop hard floors', zone:'floors', group:'Monday', time:'15 min',
      tip:{ source:'Clean Mama', text:'Use a damp (not soaking) microfibre mop. Most floors only need hot water — product leaves residue that attracts more dirt. If using cleaner, use the correct one for your floor type (hardwood vs LVP vs tile). Never flood a wood or LVP floor.' } },
    { id:'w3', name:'Clean toilets', zone:'bathroom', group:'Tuesday', time:'10 min',
      tip:{ source:'Clean Mama', text:'Apply bowl cleaner first, let it sit while you clean the exterior. Outside: lid top, lid underside, seat top and bottom, rim, base. Then scrub the bowl. Use a separate cloth for the exterior than anything else — colour code your cloths. Flush the cleaner.' } },
    { id:'w4', name:'Clean sinks and faucets', zone:'bathroom', group:'Tuesday', time:'10 min',
      tip:{ source:'Clean Mama', text:'Spray the basin, tap, and handles. Let sit. Scrub the drain area with an old toothbrush — mineral buildup accumulates there fast. Faucets should be dried after cleaning to prevent water spots. Chrome especially.' } },
    { id:'w5', name:'Scrub shower or tub', zone:'bathroom', group:'Tuesday', time:'15 min',
      tip:{ source:'Clean Mama', text:'Spray the whole surface with a daily shower spray after each use to reduce weekly scrubbing. On clean day, use a scrubbing pad on tile and grout, a softer cloth on fibreglass or acrylic. Rinse completely — soap residue is what makes shower walls look dull.' } },
    { id:'w6', name:'Wipe stovetop and oven exterior', zone:'kitchen', group:'Wednesday', time:'10 min',
      tip:{ source:'Clean Mama', text:'For gas burner grates, remove them and soak in hot soapy water for 10 minutes while you clean the rest. For glass ceramic tops, use a proper ceramic scraper for stuck debris — never use abrasive pads. Oven exterior: all-purpose spray and microfibre.' } },
    { id:'w7', name:'Clean microwave inside', zone:'kitchen', group:'Wednesday', time:'5 min',
      tip:{ source:'Clean Mama', text:'Place a bowl of water with a halved lemon inside and microwave for 3 minutes. The steam loosens everything. Then wipe with a microfibre cloth — no scrubbing needed. The lemon neutralises odour. Takes under 5 minutes total.' } },
    { id:'w8', name:'Wipe cabinet fronts and handles', zone:'kitchen', group:'Wednesday', time:'10 min',
      tip:{ source:'Clean Mama', text:'Handles collect the most grease and skin oils in the kitchen. All-purpose spray on a damp cloth. For painted cabinets, use minimal moisture and dry immediately. For wood grain, wipe with the grain direction. This is the most skipped kitchen task and the most visible when neglected.' } },
    { id:'w9', name:'Change bed linens', zone:'bedroom', group:'Thursday', time:'15 min',
      tip:{ source:'Clean Mama', text:'Clean Mama recommends washing in hot water when possible to kill dust mites. Have a second set of sheets ready so the bed can be remade immediately. Strip, remake, then launder the dirty set. Pillow protectors extend pillow life significantly — wash monthly.' } },
    { id:'w10', name:'Dust all surfaces', zone:'general', group:'Thursday', time:'15 min',
      tip:{ source:'Clean Mama', text:'Top-down: ceiling fans first, then shelves, then furniture. Use a dry microfibre cloth — electrostatic attraction picks up dust better than damp cloths which just spread it. Don\'t forget picture frames, lamp shades, and the tops of door frames.' } },
    { id:'w11', name:'Wipe mirrors and glass', zone:'general', group:'Thursday', time:'5 min',
      tip:{ source:'Clean Mama', text:'Spray cleaner on the cloth, not the mirror — prevents product from running into the frame. Use a lint-free microfibre cloth. Wipe in an S-pattern (not circular) to avoid redistributing smears. Buff dry immediately for streak-free finish.' } },
    { id:'w12', name:'Empty all trash bins', zone:'general', group:'Friday', time:'10 min',
      tip:{ source:'Clean Mama', text:'Every room with a bin — bedroom, bathroom, office, kitchen. Replace liners immediately so the bin is ready. Wipe the inside of the bin with a damp cloth occasionally. Bathroom bins fill faster than you think and are a hygiene issue if left.' } },
    { id:'w13', name:'Wipe light switches and door handles', zone:'general', group:'Friday', time:'5 min',
      tip:{ source:'Clean Mama', text:'Among the highest-touch surfaces in any home. Disinfecting wipe or all-purpose spray on a cloth. Takes 3 minutes for a whole house. This is especially important during cold and flu season — a habit worth building year-round.' } },
    { id:'w14', name:'Zone deep clean — current FlyLady zone', zone:'general', group:'Friday', time:'20 min',
      tip:{ source:'FlyLady', text:'Each week you focus on one of five zones. Don\'t attempt to do the whole house — just the active zone. 15-20 minutes of detail work in one zone per week means the whole house gets a thorough treatment over a 5-week rotation without ever having a "big clean" day.' } },
  ],
  monthly: [
    { id:'m1', name:'Clean oven inside', zone:'kitchen', group:'Week 1',
      tip:{ source:'Clean Mama', text:'Use the self-clean cycle if you have one (run it when the house is well-ventilated — it produces smoke). For manual clean: baking soda paste (baking soda + water to a spreadable consistency), apply to interior, leave overnight, wipe out next day. Spray vinegar to react with remaining baking soda residue.' } },
    { id:'m2', name:'Clean fridge inside — clear expired items', zone:'kitchen', group:'Week 1',
      tip:{ source:'Clean Mama', text:'Remove all shelves and drawers. Wash with warm soapy water and dry completely before replacing. Wipe interior walls with an all-purpose spray. Put an open box of baking soda inside to absorb odours (replace every 3 months). Check door seals for mould — wipe with white vinegar.' } },
    { id:'m3', name:'Wipe all appliances exterior', zone:'kitchen', group:'Week 1',
      tip:{ source:'Clean Mama', text:'Fridge exterior, dishwasher front, toaster, coffee maker, kettle. Stainless steel: always wipe with the grain using a microfibre cloth barely dampened with water or a dedicated SS cleaner. Fingerprints on stainless show everything — a quick weekly wipe prevents monthly buildup.' } },
    { id:'m4', name:'Clean bathroom exhaust fan cover', zone:'bathroom', group:'Week 2',
      tip:{ source:'Clean Mama', text:'A clogged exhaust fan can\'t remove moisture, leading to mould. Remove the cover (most just pull down and unclip), wash in warm soapy water, dry completely, reinstall. While the cover is off, vacuum the fan blades gently with a soft brush attachment. Should take under 10 minutes.' } },
    { id:'m5', name:'Wash shower curtain and liner', zone:'bathroom', group:'Week 2',
      tip:{ source:'Clean Mama', text:'Throw both in the washing machine with a couple of towels (the towels act as scrubbers). Cold water, gentle cycle, regular detergent. Add half a cup of white vinegar to the rinse cycle. Hang to dry — don\'t put plastic liners in the dryer. Replace the liner every 3-6 months regardless.' } },
    { id:'m6', name:'Scrub grout lines', zone:'bathroom', group:'Week 2',
      tip:{ source:'Clean Mama', text:'Mix baking soda and water to a paste. Apply to grout lines with an old toothbrush. Let sit 5 minutes. Scrub and rinse. For mould in grout, spray undiluted white vinegar first, let sit 10 minutes, then scrub. Reseal grout annually with a penetrating grout sealer to make future cleaning much easier.' } },
    { id:'m7', name:'Wash all bed pillows', zone:'bedroom', group:'Week 3',
      tip:{ source:'Clean Mama', text:'Most pillows (down, synthetic, memory foam) are machine washable — check the tag. For down/synthetic: two pillows at once to balance the load, warm water, gentle cycle, extra rinse, low heat dry with a couple of tennis balls to prevent clumping. Memory foam: hand wash only, air dry flat. Pillows absorb 10% of their weight in skin cells and sweat within 2 years.' } },
    { id:'m8', name:'Flip or rotate mattress', zone:'bedroom', group:'Week 3',
      tip:{ source:'Clean Mama', text:'Most modern mattresses are one-sided (pillow top) — rotate head to foot only, don\'t flip. Traditional double-sided mattresses should be flipped and rotated. A consistent rotation pattern (mark a corner) ensures even wear. While the mattress is bare, sprinkle baking soda, let sit 30 minutes, vacuum up to deodorise.' } },
    { id:'m9', name:'Dust ceiling fans and light fixtures', zone:'general', group:'Week 3',
      tip:{ source:'Clean Mama', text:'Use a pillowcase over each fan blade — slide it on, then slide it off, trapping the dust inside. For light fixtures, turn the power off first. A barely-damp microfibre cloth on glass shades, a dry one on bulbs. Ceiling fans accumulate significant dust quickly because they\'re always moving through air.' } },
    { id:'m10', name:'Wipe all baseboards', zone:'general', group:'Week 4',
      tip:{ source:'Clean Mama', text:'A dry microfibre sock on your hand works perfectly. Wipe along the top edge first (most dust collects there), then the face. For painted baseboards, follow with a barely-damp cloth to remove stubborn marks. The FlyLady zone system means only one zone\'s baseboards per week — this monthly task is a full sweep.' } },
    { id:'m11', name:'Clean inside windows', zone:'general', group:'Week 4',
      tip:{ source:'Clean Mama', text:'Spray glass cleaner on your cloth, not the glass. Use a squeegee for large panes — overlap each stroke by an inch and wipe the blade after each pass. For the frame and sill: vacuum debris first, then wipe with an all-purpose spray. Don\'t clean windows in direct sunlight — the cleaner dries too fast and streaks.' } },
    { id:'m12', name:'Test smoke and CO detectors', zone:'general', group:'Week 4',
      tip:{ source:'general', text:'Hold the test button until the alarm sounds — takes about 5 seconds. If it doesn\'t sound, replace the battery immediately. Best practice is to replace all detector batteries once a year on a fixed date (many use daylight saving time as the anchor). CO detectors have a lifespan of 5-7 years and must be replaced regardless of apparent function.' } },
    { id:'m13', name:'Clean dryer lint trap and vent', zone:'laundry', group:'Week 4',
      tip:{ source:'general', text:'The lint trap should be cleared after every load — but monthly, wash it with warm soapy water and a soft brush to clear the mesh holes (dryer sheet residue clogs them). The exterior vent duct should be inspected and cleared annually — a blocked dryer vent is a leading cause of house fires. Check the exterior flap opens freely when the dryer runs.' } },
    { id:'m14', name:'Wipe washer drum and door seal', zone:'laundry', group:'Week 4',
      tip:{ source:'Clean Mama', text:'Front-loaders accumulate mould in the rubber door gasket — wipe it out thoroughly with a diluted bleach solution or white vinegar. Run a monthly hot wash with no clothes and a washer cleaning tablet or cup of white vinegar. Leave the door ajar between loads so the drum can dry — this is the single best prevention for front-loader mould.' } },
  ],
};

const state = { daily:{}, weekly:{}, monthly:{} };

function pill(zone) {
  const map = {
    kitchen:'pill-kitchen', bathroom:'pill-bathroom', bedroom:'pill-bedroom',
    living:'pill-living', laundry:'pill-laundry', floors:'pill-floors',
    general:'pill-general', outside:'pill-outside'
  };
  return `<span class="zone-pill ${map[zone]||'pill-general'}">${zone}</span>`;
}

function chevron() {
  return `<svg class="expand-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function checkmark() {
  return `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function renderList(view) {
  const container = document.getElementById('list-' + view);
  const items = tasks[view];
  const groups = {};
  items.forEach(t => {
    const g = t.group || '_';
    if (!groups[g]) groups[g] = [];
    groups[g].push(t);
  });

  const multiGroup = Object.keys(groups).filter(k => k !== '_').length > 0;
  let html = '';

  Object.keys(groups).forEach(g => {
    if (multiGroup && g !== '_') {
      html += `<div class="group-label">${g}</div>`;
    }
    groups[g].forEach(t => {
      const done = !!state[view][t.id];
      const hasTip = !!t.tip;
      html += `
      <div class="task-item${done?' done':''}${hasTip?'':' no-tip'}" id="item-${t.id}">
        <div class="task-header" onclick="handleClick('${view}','${t.id}',event)">
          <div class="check-circle" onclick="toggleDone(event,'${view}','${t.id}')">
            ${checkmark()}
          </div>
          <span class="task-name">${t.name}</span>
          <div class="task-right">
            ${t.time ? `<span class="time-label">${t.time}</span>` : ''}
            ${pill(t.zone)}
            ${chevron()}
          </div>
        </div>
        ${hasTip ? `
        <div class="task-tip">
          <div class="tip-source">${t.tip.source}</div>
          <div>${t.tip.text}</div>
        </div>` : ''}
      </div>`;
    });
  });

  container.innerHTML = html;
  updateProgress(view);
}

function handleClick(view, id, e) {
  if (e.target.closest('.check-circle')) return;
  const item = document.getElementById('item-' + id);
  if (item.classList.contains('no-tip')) return;
  item.classList.toggle('expanded');
}

function toggleDone(e, view, id) {
  e.stopPropagation();
  state[view][id] = !state[view][id];
  const item = document.getElementById('item-' + id);
  item.classList.toggle('done', !!state[view][id]);
  updateProgress(view);
}

function updateProgress(view) {
  const items = tasks[view];
  const done = items.filter(t => state[view][t.id]).length;
  const total = items.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-' + view).style.width = pct + '%';
  document.getElementById('prog-' + view + '-txt').textContent = done + ' / ' + total;
}

function resetView(view) {
  state[view] = {};
  renderList(view);
}

function switchTab(e, view) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('view-' + view).classList.add('active');
  if (view === 'health') renderHealth();
  if (view === 'history') renderHistory();
}

function renderZones() {
  const cards = document.getElementById('zone-cards');
  cards.innerHTML = ZONES.map(z => `
    <div class="zone-card">
      <div class="zone-num">ZONE ${z.num}</div>
      <div class="zone-name">${z.name}</div>
      <div class="zone-rooms">${z.rooms}</div>
      <span class="zone-week-badge">${z.week}</span>
    </div>
  `).join('');

  const list = document.getElementById('zone-task-list');
  list.innerHTML = ZONE_TASKS.map((t, i) => `
    <div class="task-item" id="zt-${i}">
      <div class="task-header" onclick="toggleZone(${i})">
        <div class="check-circle"></div>
        <span class="task-name">${t.name}</span>
        <div class="task-right">
          <span class="zone-pill pill-general">zone</span>
          ${chevron()}
        </div>
      </div>
      <div class="task-tip">
        <div class="tip-source">${t.tip.source}</div>
        <div>${t.tip.text}</div>
      </div>
    </div>
  `).join('');
}

function toggleZone(i) {
  document.getElementById('zt-' + i).classList.toggle('expanded');
}

// ============ HEALTH + HISTORY ============
const SLEEP_OPTIONS = [
  { key: 'poor',  emoji: '😵', label: 'Poor',  sub: '<6h' },
  { key: 'ok',    emoji: '😴', label: 'OK',    sub: '6–8h' },
  { key: 'great', emoji: '🌟', label: 'Great', sub: '8h+' },
];
const ACTIVITY_OPTIONS = [
  { key: 'weights',  emoji: '💪', label: 'Weights' },
  { key: 'yoga',     emoji: '🧘', label: 'Yoga' },
  { key: 'mobility', emoji: '🤸', label: 'Mobility' },
  { key: 'cardio',   emoji: '🏃', label: 'Cardio' },
  { key: 'meditate', emoji: '🫁', label: 'Meditate' },
  { key: 'rest',     emoji: '🛋️', label: 'Rest' },
];
const FLUID_OPTIONS = [
  { key: 'water',        emoji: '💧', label: 'Water' },
  { key: 'electrolytes', emoji: '🧂', label: 'Electrolytes' },
  { key: 'creatine',     emoji: '🧠', label: 'Creatine' },
];
const MEAL_SLOTS = [
  { key: 'breakfast',       emoji: '🌅', label: 'Breakfast' },
  { key: 'morning_snack',   emoji: '☕', label: 'Morning Snack' },
  { key: 'lunch',           emoji: '🌤️', label: 'Lunch' },
  { key: 'afternoon_snack', emoji: '🍎', label: 'Afternoon Snack' },
  { key: 'dinner',          emoji: '🌙', label: 'Dinner' },
  { key: 'evening_snack',   emoji: '🌛', label: 'Evening Snack' },
];
const FOOD_OPTIONS = [
  { key: 'protein', emoji: '🥩', label: 'Protein' },
  { key: 'carb',    emoji: '🥔', label: 'Carb' },
  { key: 'fat',     emoji: '🧈', label: 'Fat' },
  { key: 'fruit',   emoji: '🍎', label: 'Fruit' },
  { key: 'veg',     emoji: '🥦', label: 'Veg' },
  { key: 'snack',   emoji: '🍟', label: 'Snack' },
  { key: 'sugar',   emoji: '🍬', label: 'Sugar' },
];
const FLUID_MAX = 8;
const FOOD_MAX = 5;
const HISTORY_DAYS = 30;
const HEALTH_KEY = 'homeloop-health-v2';

let healthStore = {};
const mealBuilder = { slot: 'breakfast', foods: {} };
let calCursor = null;

function loadHealth() {
  try {
    const raw = localStorage.getItem(HEALTH_KEY);
    healthStore = raw ? JSON.parse(raw) : {};
  } catch (e) { healthStore = {}; }
}
function saveHealth() {
  try { localStorage.setItem(HEALTH_KEY, JSON.stringify(healthStore)); } catch (e) {}
}

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function parseIso(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function dayStart(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function todayKey() { return isoDate(new Date()); }
function getDay(key) {
  if (!healthStore[key]) healthStore[key] = { sleep: null, activity: {}, fluids: {}, meals: [] };
  return healthStore[key];
}
function findByKey(arr, k) { return arr.find(x => x.key === k); }

function formatTime(ts) {
  const d = new Date(ts);
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

// sleep: mutually exclusive, tap again to deselect
function setSleep(k) {
  const day = getDay(todayKey());
  day.sleep = day.sleep === k ? null : k;
  saveHealth();
  renderHealth();
}

// activity: independent toggles
function toggleActivity(k) {
  const day = getDay(todayKey());
  if (day.activity[k]) delete day.activity[k];
  else day.activity[k] = true;
  saveHealth();
  renderHealth();
}

// fluids: tap-to-increment; past max resets to 0
function tapFluid(k) {
  const day = getDay(todayKey());
  const cur = day.fluids[k] || 0;
  const next = cur >= FLUID_MAX ? 0 : cur + 1;
  if (next === 0) delete day.fluids[k];
  else day.fluids[k] = next;
  saveHealth();
  renderHealth();
}

// meal builder
function setMealSlot(slot) { mealBuilder.slot = slot; }
function tapFood(k) {
  const cur = mealBuilder.foods[k] || 0;
  if (cur >= FOOD_MAX) delete mealBuilder.foods[k];
  else mealBuilder.foods[k] = cur + 1;
  renderHealth();
}
function removeFoodChip(k) {
  delete mealBuilder.foods[k];
  renderHealth();
}
function logMeal() {
  if (!Object.keys(mealBuilder.foods).length) return;
  const day = getDay(todayKey());
  day.meals.push({
    id: 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    slot: mealBuilder.slot,
    time: Date.now(),
    foods: { ...mealBuilder.foods },
  });
  mealBuilder.foods = {};
  saveHealth();
  renderHealth();
}
function deleteMeal(id) {
  const day = getDay(todayKey());
  day.meals = day.meals.filter(m => m.id !== id);
  saveHealth();
  renderHealth();
}

function dayHasAnyData(d) {
  if (!d) return false;
  if (d.sleep) return true;
  if (d.activity && Object.values(d.activity).some(v => v)) return true;
  if (d.fluids && Object.values(d.fluids).some(v => v > 0)) return true;
  if (d.meals && d.meals.length > 0) return true;
  return false;
}

// ---- render ----
function renderHealth() {
  const day = getDay(todayKey());
  renderHealthSummary(day);
  renderSleep(day);
  renderActivity(day);
  renderFluids(day);
  renderFood(day);
}

function renderHealthSummary(day) {
  const sOpt = day.sleep ? findByKey(SLEEP_OPTIONS, day.sleep) : null;
  const sleepStr = sOpt ? `${sOpt.emoji} ${sOpt.label}` : '—';
  const actKeys = Object.keys(day.activity).filter(k => day.activity[k]);
  const actStr = actKeys.length
    ? actKeys.map(k => findByKey(ACTIVITY_OPTIONS, k)?.emoji).join(' ')
    : '—';
  const fluidEntries = Object.entries(day.fluids).filter(([, v]) => v > 0);
  const fluidStr = fluidEntries.length
    ? fluidEntries.map(([k, v]) => `${findByKey(FLUID_OPTIONS, k)?.emoji}×${v}`).join(' ')
    : '—';
  const mealStr = day.meals.length ? `${day.meals.length} logged` : '—';

  document.getElementById('health-summary').innerHTML = `
    <div class="health-summary-cell">
      <div class="health-summary-label">Sleep</div>
      <div class="health-summary-value">${sleepStr}</div>
    </div>
    <div class="health-summary-cell">
      <div class="health-summary-label">Activity</div>
      <div class="health-summary-value">${actStr}</div>
    </div>
    <div class="health-summary-cell">
      <div class="health-summary-label">Fluids</div>
      <div class="health-summary-value">${fluidStr}</div>
    </div>
    <div class="health-summary-cell">
      <div class="health-summary-label">Meals</div>
      <div class="health-summary-value">${mealStr}</div>
    </div>`;
}

function renderSleep(day) {
  document.getElementById('sleep-options').innerHTML = SLEEP_OPTIONS.map(o => `
    <button class="sleep-btn ${day.sleep === o.key ? 'active' : ''}" onclick="setSleep('${o.key}')">
      <span class="sleep-emoji">${o.emoji}</span>
      <span class="sleep-label">${o.label}</span>
      <span class="sleep-sub">${o.sub}</span>
    </button>`).join('');
}

function renderActivity(day) {
  document.getElementById('activity-grid').innerHTML = ACTIVITY_OPTIONS.map(o => `
    <button class="emoji-toggle ${day.activity[o.key] ? 'active' : ''}" onclick="toggleActivity('${o.key}')">
      <span class="emoji-toggle-emoji">${o.emoji}</span>
      <span class="emoji-toggle-label">${o.label}</span>
    </button>`).join('');
}

function renderFluids(day) {
  document.getElementById('fluids-grid').innerHTML = FLUID_OPTIONS.map(o => {
    const c = day.fluids[o.key] || 0;
    return `
      <button class="fluid-btn ${c > 0 ? 'active' : ''}" onclick="tapFluid('${o.key}')">
        <span class="fluid-emoji">${o.emoji}</span>
        <span class="fluid-label">${o.label}</span>
        <span class="fluid-count">${c > 0 ? '×' + c : '—'}</span>
      </button>`;
  }).join('');
}

function renderFood(day) {
  const sel = document.getElementById('meal-slot');
  if (sel.options.length === 0) {
    sel.innerHTML = MEAL_SLOTS.map(s => `<option value="${s.key}">${s.emoji} ${s.label}</option>`).join('');
  }
  sel.value = mealBuilder.slot;

  document.getElementById('food-grid').innerHTML = FOOD_OPTIONS.map(o => {
    const c = mealBuilder.foods[o.key] || 0;
    return `
      <button class="food-btn ${c > 0 ? 'active' : ''}" onclick="tapFood('${o.key}')">
        <span class="food-btn-emoji">${o.emoji}</span>
        <span class="food-btn-label">${o.label}</span>
        <span class="food-btn-qty">×${c}</span>
      </button>`;
  }).join('');

  const chips = Object.entries(mealBuilder.foods);
  document.getElementById('food-chips').innerHTML = chips.map(([k, v]) => {
    const o = findByKey(FOOD_OPTIONS, k);
    return `<span class="food-chip">${o.emoji} ${o.label} ×${v}<button class="food-chip-x" onclick="removeFoodChip('${k}')">×</button></span>`;
  }).join('');

  document.getElementById('log-meal-btn').disabled = chips.length === 0;

  const totals = {};
  day.meals.forEach(m => {
    Object.entries(m.foods).forEach(([k, v]) => { totals[k] = (totals[k] || 0) + v; });
  });
  const totalEntries = Object.entries(totals);
  document.getElementById('food-totals').innerHTML =
    `<span class="food-totals-label">Today</span>` + (totalEntries.length
      ? totalEntries.map(([k, v]) => {
          const o = findByKey(FOOD_OPTIONS, k);
          return `<span class="food-total-item">${o.emoji}<span class="food-total-count">×${v}</span></span>`;
        }).join('')
      : `<span class="food-totals-empty">no meals logged</span>`);

  const list = document.getElementById('meals-list');
  if (!day.meals.length) {
    list.innerHTML = `<div class="meals-empty">No meals logged today</div>`;
  } else {
    const sorted = [...day.meals].sort((a, b) => a.time - b.time);
    list.innerHTML = sorted.map(m => {
      const slot = findByKey(MEAL_SLOTS, m.slot);
      const chipsHtml = Object.entries(m.foods).map(([k, v]) => {
        const o = findByKey(FOOD_OPTIONS, k);
        return `<span class="meal-entry-chip">${o.emoji}<span class="meal-entry-chip-count">×${v}</span></span>`;
      }).join('');
      return `
        <div class="meal-entry">
          <span class="meal-entry-slot">${slot.label}</span>
          <span class="meal-entry-time">${formatTime(m.time)}</span>
          <span class="meal-entry-chips">${chipsHtml}</span>
          <button class="meal-entry-delete" onclick="deleteMeal('${m.id}')">×</button>
        </div>`;
    }).join('');
  }
}

// ---- history ----
function initCal() {
  const t = new Date();
  calCursor = { year: t.getFullYear(), month: t.getMonth() };
}
function calShift(delta) {
  let y = calCursor.year, m = calCursor.month + delta;
  if (m < 0) { m += 12; y -= 1; }
  if (m > 11) { m -= 12; y += 1; }
  calCursor = { year: y, month: m };
  renderHistory();
}
function windowStart() {
  const today = dayStart(new Date());
  const start = new Date(today);
  start.setDate(today.getDate() - (HISTORY_DAYS - 1));
  return start;
}
function renderHistory() {
  const today = dayStart(new Date());
  const wstart = windowStart();

  const prevBtn = document.getElementById('cal-prev');
  const nextBtn = document.getElementById('cal-next');
  const prevMonthLast = new Date(calCursor.year, calCursor.month, 0);
  prevBtn.disabled = prevMonthLast < wstart;
  nextBtn.disabled = calCursor.year === today.getFullYear() && calCursor.month === today.getMonth();

  document.getElementById('cal-title').textContent =
    new Date(calCursor.year, calCursor.month, 1)
      .toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const dow = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html = dow.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstOfMonth = new Date(calCursor.year, calCursor.month, 1);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = new Date(calCursor.year, calCursor.month + 1, 0).getDate();

  for (let i = 0; i < startDow; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const cellDate = new Date(calCursor.year, calCursor.month, d);
    const iso = isoDate(cellDate);
    const inWindow = cellDate >= wstart && cellDate <= today;
    const isToday = cellDate.getTime() === today.getTime();
    const data = healthStore[iso];
    const hasData = inWindow && dayHasAnyData(data);
    const classes = ['cal-cell'];
    if (isToday) classes.push('today');
    if (!inWindow) classes.push('muted');
    else if (hasData) classes.push('has-data');
    const clickAttr = hasData ? ` onclick="openDayModal('${iso}')"` : '';
    html += `<div class="${classes.join(' ')}"${clickAttr}><span>${d}</span><span class="cal-dot"></span></div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function openDayModal(iso) {
  const d = healthStore[iso];
  if (!d) return;
  const dateStr = parseIso(iso).toLocaleDateString('en-US',
    { weekday: 'long', month: 'long', day: 'numeric' });

  const sOpt = d.sleep ? findByKey(SLEEP_OPTIONS, d.sleep) : null;
  const sleepHtml = sOpt
    ? `<span class="modal-chip">${sOpt.emoji} ${sOpt.label}</span>`
    : `<span class="modal-empty">Not logged</span>`;

  const actKeys = Object.keys(d.activity || {}).filter(k => d.activity[k]);
  const actHtml = actKeys.length
    ? actKeys.map(k => {
        const o = findByKey(ACTIVITY_OPTIONS, k);
        return `<span class="modal-chip">${o.emoji} ${o.label}</span>`;
      }).join('')
    : `<span class="modal-empty">Not logged</span>`;

  const fluidEntries = Object.entries(d.fluids || {}).filter(([, v]) => v > 0);
  const fluidHtml = fluidEntries.length
    ? fluidEntries.map(([k, v]) => {
        const o = findByKey(FLUID_OPTIONS, k);
        return `<span class="modal-chip">${o.emoji} ${o.label} ×${v}</span>`;
      }).join('')
    : `<span class="modal-empty">Not logged</span>`;

  const meals = d.meals || [];
  const mealsHtml = meals.length
    ? `<div class="modal-meal-list">${[...meals].sort((a, b) => a.time - b.time).map(m => {
        const slot = findByKey(MEAL_SLOTS, m.slot);
        const chips = Object.entries(m.foods).map(([fk, fv]) => {
          const fo = findByKey(FOOD_OPTIONS, fk);
          return `<span class="meal-entry-chip">${fo.emoji}<span class="meal-entry-chip-count">×${fv}</span></span>`;
        }).join(' ');
        return `
          <div class="modal-meal-entry">
            <span class="meal-entry-slot">${slot.label}</span>
            <span class="meal-entry-time">${formatTime(m.time)}</span>
            <span class="meal-entry-chips">${chips}</span>
          </div>`;
      }).join('')}</div>`
    : `<span class="modal-empty">No meals logged</span>`;

  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="closeDayModal()">×</button>
    <div class="modal-date">${dateStr}</div>
    <div class="modal-section">
      <div class="modal-section-label">Sleep</div>
      <div class="modal-section-value">${sleepHtml}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Activity</div>
      <div class="modal-section-value">${actHtml}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Fluids</div>
      <div class="modal-section-value">${fluidHtml}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Food</div>
      <div class="modal-section-value">${mealsHtml}</div>
    </div>`;
  document.getElementById('day-modal').classList.add('open');
}

function closeDayModal() {
  document.getElementById('day-modal').classList.remove('open');
}
function overlayClick(e) {
  if (e.target.id === 'day-modal') closeDayModal();
}

['daily','weekly','monthly'].forEach(renderList);
renderZones();
loadHealth();
initCal();
renderHealth();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
